
<html>
<head>
    <title>Document</title>
    <script>
        function prime(){
            num = document.getElementById("n").value
            var i, c = 0;
            for (i = 1; i <= num; i++){
                if (num % i == 0){
                    c = c + 1;
                }
            }
            if (c == 2){
                alert("Prime number");
            }
            else {
                alert("Composite number");
            }
        }
    </script>
</head>
<body>
    <input type="number" name="" id="n">
    <input type="button" value="Check" onclick="prime()">
</body>
</html>
