<html>
    <head>
        <title>Q1</title>
        <script lang="JavaScript">
            function change()
            {
                var a=document.getElementById(1).value
                a="Welcome to DOM Manipulation"
                document.write(a)
            }
        </script>
    </head>
    <body>
        <h2 id="1">Hello World</h2>
        <input type="button" value="change" onclick="change()">
    </body>
</html>
